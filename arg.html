            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(150, 190, 255, 0.1);
            padding-bottom: 4px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #aac3f0;
        }

        @media (max-width: 600px) {
            .btn { width: 90%; }
            .page-title { font-size: 1.6rem; }
        }
